<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
      
    }

    .calculator {
      background: black;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px #444;
      transform: scale(1); 
    }

    input[type="text"] {
      width: 280px;
      height: 45px;
      margin: 8px 0;
      font-size: 22px;
     
      border-radius: 8px;
      border: none;
      outline: none;
      padding: 8px;
      background: #fff;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 65px);
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
    }

    button {
      height: 60px;
      font-size: 22px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #e0e0e0;
      transition: 0.2s;
    }

    button:hover {
      background: #ccc;
    }

    .clear {
      background: red;
      color: white;
    }

    #output {
      width: 280px;
      height: 45px;
      margin-top: 15px;
      font-size: 22px;
     
      border-radius: 8px;
      border: none;
      outline: none;
      padding: 8px;
      background: #fff;
    }
  </style>
</head>
<body>

  <div class="calculator">
    
    <input type="text" id="inputBox" placeholder="Enter expression">

   
    <div class="buttons">
      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="append('+')">+</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('-')">−</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('*')">×</button>

      <button onclick="append('0')">0</button>
      <button class="clear" onclick="clearInput()">C</button>
      <button onclick="calculate()">=</button>
      <button onclick="append('/')">÷</button>
    </div>

    
    <input type="text" id="output" readonly placeholder="Result">
  </div>

  <script>
    function append(value) {
      document.getElementById("inputBox").value += value;
    }

    function calculate() {
      let input = document.getElementById("inputBox").value;
      try {
        document.getElementById("output").value = eval(input);
      } catch {
        document.getElementById("output").value = "Error";
      }
    }

    function clearInput() {
      document.getElementById("inputBox").value = "";
      document.getElementById("output").value = "";
    }
  </script>

</body>
</html>
